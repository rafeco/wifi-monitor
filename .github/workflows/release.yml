name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Create app bundle
        run: |
          mkdir -p WiFiMonitor.app/Contents/MacOS
          mkdir -p WiFiMonitor.app/Contents/Resources

          # Copy binary
          cp .build/release/WiFiMonitor WiFiMonitor.app/Contents/MacOS/

          # Generate icon
          mkdir -p icon.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size AppIcon.png --out "icon.iconset/icon_${size}x${size}.png" >/dev/null
            double=$((size * 2))
            sips -z $double $double AppIcon.png --out "icon.iconset/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns icon.iconset -o WiFiMonitor.app/Contents/Resources/AppIcon.icns
          rm -rf icon.iconset

          # Create Info.plist
          VERSION=${GITHUB_REF_NAME#v}
          cat > WiFiMonitor.app/Contents/Info.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleExecutable</key>
              <string>WiFiMonitor</string>
              <key>CFBundleIdentifier</key>
              <string>com.local.WiFiMonitor</string>
              <key>CFBundleName</key>
              <string>WiFi Monitor</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
          </dict>
          </plist>
          PLIST

      - name: Zip app bundle
        run: ditto -c -k --keepParent WiFiMonitor.app WiFiMonitor.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: WiFiMonitor.zip
          generate_release_notes: true
