name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Build
        run: swift build -c release

      - name: Create app bundle
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p WiFiMonitor.app/Contents/MacOS
          mkdir -p WiFiMonitor.app/Contents/Resources

          cp .build/release/WiFiMonitor WiFiMonitor.app/Contents/MacOS/

          # Icon — squircle-masked, matching the local build.
          swiftc scripts/squircle.swift -o /tmp/squircle
          /tmp/squircle AppIcon.png /tmp/AppIcon-masked.png
          mkdir -p icon.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size /tmp/AppIcon-masked.png --out "icon.iconset/icon_${size}x${size}.png" >/dev/null
            double=$((size * 2))
            sips -z $double $double /tmp/AppIcon-masked.png --out "icon.iconset/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns icon.iconset -o WiFiMonitor.app/Contents/Resources/AppIcon.icns
          rm -rf icon.iconset

          # Info.plist — use the checked-in file (single source of truth),
          # patching the version from the tag.
          cp Info.plist WiFiMonitor.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" WiFiMonitor.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" WiFiMonitor.app/Contents/Info.plist

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign app bundle
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          SIGN_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "Signing with: $SIGN_IDENTITY"
          codesign --force --options runtime --timestamp \
            --sign "$SIGN_IDENTITY" WiFiMonitor.app
          codesign --verify --strict --verbose=2 WiFiMonitor.app

      - name: Notarize and staple
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          ditto -c -k --keepParent WiFiMonitor.app WiFiMonitor.zip
          xcrun notarytool submit WiFiMonitor.zip \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD" \
            --wait
          xcrun stapler staple WiFiMonitor.app
          # Re-zip the stapled app for distribution.
          ditto -c -k --keepParent WiFiMonitor.app WiFiMonitor.zip

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: WiFiMonitor.zip
          generate_release_notes: true
