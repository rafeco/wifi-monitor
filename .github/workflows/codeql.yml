name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1'  # weekly, Monday 04:23 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (Swift)
    # Swift analysis is only supported on macOS runners.
    runs-on: macos-14
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: autobuild
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
